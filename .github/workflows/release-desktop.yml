name: Release Desktop Installers

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - name: Validate tag format
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use vMAJOR.MINOR.PATCH, got: $TAG" >&2
            exit 1
          fi

          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build release DMG
        shell: bash
        run: ./gradlew :composeApp:packageReleaseDmg -PpackageVersion=${{ needs.prepare.outputs.app_version }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-dmg-${{ github.ref_name }}
          path: composeApp/build/compose/binaries/main-release/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build release MSI
        shell: pwsh
        run: .\gradlew.bat :composeApp:packageReleaseMsi "-PpackageVersion=${{ needs.prepare.outputs.app_version }}"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-msi-${{ github.ref_name }}
          path: composeApp/build/compose/binaries/main-release/msi/*.msi
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: macos-dmg-${{ github.ref_name }}
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: windows-msi-${{ github.ref_name }}
          path: release-assets/windows

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/macos/*.dmg release-assets/windows/*.msi --clobber --repo "$GH_REPO"
          else
            gh release create "$TAG" release-assets/macos/*.dmg release-assets/windows/*.msi --title "$TAG" --generate-notes --repo "$GH_REPO"
          fi
